<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训室全景浏览</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 全景 */
        #panorama {
            width: 100vw;
            height: 100vh;
        }

        /* 顶部教室标题（居中 半透明） */
        .room-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 999;
            display: none;
            white-space: nowrap;
        }

        /* 半透明启动页 */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }
        #splash .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #splash .logo img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
        #splash .welcome {
            color: #fff;
            font-size: 22px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px #000;
        }
        #splash .enter-btn {
            padding: 12px 30px;
            background: rgba(255,255,255,0.9);
            color: #002b5c;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        #splash .enter-btn:hover {
            transform: scale(1.05);
        }

        /* 左侧悬浮目录 */
        .menu-area {
            display: none;
        }
        .menu-trigger {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 12px 8px;
            border-radius: 0 8px 8px 0;
            z-index: 9999;
            cursor: pointer;
            writing-mode: vertical-rl;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .menu-panel {
            position: fixed;
            left: -220px;
            top: 0;
            width: 220px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 30px 20px;
            z-index: 9998;
            transition: left 0.3s ease;
        }
        .menu-area:hover .menu-panel {
            left: 0;
        }
        .menu-title {
            color: #fff;
            font-size: 18px;
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .item {
            color: #fff;
            padding: 12px 15px;
            margin: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .item:hover, .item.active {
            background: rgba(255,255,255,0.2);
        }

        .tip {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            display: none;
        }
    </style>
</head>

<body>

<!-- 全景 -->
<div id="panorama"></div>

<!-- 顶部教室名称 -->
<div class="room-title" id="roomTitle">数字媒体实训室1</div>

<!-- 启动页 -->
<div id="splash">
    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>
    <div class="welcome">欢迎来到校园全景浏览</div>
    <button class="enter-btn" onclick="enterPanorama()">进入全景</button>
</div>

<!-- 左侧目录 -->
<div class="menu-area">
    <div class="menu-trigger">目录</div>
    <div class="menu-panel">
        <div class="menu-title">教室列表</div>
        <div class="item active" data-src="pic.jpg" data-name="数字媒体实训室1">数字媒体实训室1</div>
        <div class="item" data-src="pic1.jpg" data-name="数字媒体实训室2">数字媒体实训室2</div>
        <div class="item" data-src="pic2.jpg" data-name="数字媒体实训室3">数字媒体实训室3</div>
        <div class="item" data-src="pic3.jpg" data-name="数字媒体实训室4">数字媒体实训室4</div>
    </div>
</div>

<div class="tip">拖动查看 · 滚轮缩放</div>

<script>
let viewer;

// 初始化加载教室1
loadPanorama('pic.jpg', '数字媒体实训室1');

// 进入全景
function enterPanorama() {
    const splash = document.getElementById('splash');
    splash.style.opacity = 0;
    setTimeout(() => {
        splash.style.display = 'none';
        document.querySelector('.menu-area').style.display = 'block';
        document.querySelector('.tip').style.display = 'block';
        document.getElementById('roomTitle').style.display = 'block';
    }, 500);
}

// 加载全景 + 更新标题
function loadPanorama(img, name) {
    if (viewer) viewer.destroy();
    viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: img,
        autoLoad: true,
        showControls: true,
        compass: true,
        autoRotate: 0
    });
    document.getElementById('roomTitle').innerText = name;
}

// 点击切换教室
document.querySelectorAll('.item').forEach(item => {
    item.onclick = function () {
        document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        
        const img = this.dataset.src;
        const name = this.dataset.name;
        loadPanorama(img, name);
    }
});
</script>

</body>
</html>
